<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAKURA-NET リモートサポート</title>
  <!-- SERVER_IP -->
  <!-- PUBLIC_KEY -->
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", "Yu Gothic", sans-serif;
      background-color: #fdf6f9;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: #e8b4c8;
      padding: 20px 16px;
      text-align: center;
    }

    header h1 {
      font-size: 1.6rem;
      color: #fff;
      letter-spacing: 0.05em;
      text-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }

    main {
      flex: 1;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 16px;
    }

    .lead {
      font-size: 1rem;
      line-height: 1.8;
      color: #555;
      margin-bottom: 32px;
      padding: 16px;
      background-color: #fff;
      border-left: 4px solid #e8b4c8;
      border-radius: 0 8px 8px 0;
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 28px;
    }

    .step {
      background-color: #fff;
      border-radius: 12px;
      padding: 24px 20px;
      box-shadow: 0 2px 8px rgba(232, 180, 200, 0.18);
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .step-number {
      background-color: #e8b4c8;
      color: #fff;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 50%;
      min-width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step-content {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .step-text {
      font-size: 1rem;
      line-height: 1.7;
      color: #333;
    }

    .download-btn {
      display: inline-block;
      background-color: #e8b4c8;
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      text-align: center;
      transition: background-color 0.2s;
      box-shadow: 0 2px 6px rgba(232, 180, 200, 0.4);
      align-self: flex-start;
    }

    .download-btn:hover,
    .download-btn:focus {
      background-color: #d49ab4;
      outline: none;
    }

    .notice {
      background-color: #fff8fb;
      border: 1px solid #e8b4c8;
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 0.9rem;
      color: #888;
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .notice::before {
      content: "ℹ️ ";
    }

    footer {
      background-color: #e8b4c8;
      text-align: center;
      padding: 14px 16px;
      font-size: 0.85rem;
      color: #fff;
    }

    @media (max-width: 480px) {
      header h1 {
        font-size: 1.25rem;
      }

      .step {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .download-btn {
        width: 100%;
        text-align: center;
        align-self: stretch;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>SAKURA-NET リモートサポート</h1>
  </header>

  <main>
    <p class="lead">
      サポートスタッフの指示に従い、以下の手順でソフトウェアをインストールしてください。
    </p>

    <div class="steps">

      <div class="step">
        <div class="step-number">1</div>
        <div class="step-content">
          <p class="step-text">下のボタンからRustDeskをダウンロードしてインストールしてください。</p>
          <a class="download-btn" href="https://github.com/rustdesk/rustdesk/releases/download/1.4.6/rustdesk-1.4.6-x86_64.exe">
            RustDeskをダウンロード
          </a>
        </div>
      </div>

      <div class="step">
        <div class="step-number">2</div>
        <div class="step-content">
          <p class="step-text">次に設定ファイルをダウンロードして実行してください。</p>
          <a class="download-btn" href="customer-setup.bat" download="customer-setup.bat">
            設定ファイルをダウンロード
          </a>
        </div>
      </div>

      <div class="step">
        <div class="step-number">3</div>
        <div class="step-content">
          <p class="step-text">RustDeskが起動したら、IDとパスワードをスタッフにお伝えください。</p>
        </div>
      </div>

    </div>

    <p class="notice">このソフトウェアはサポート完了後にアンインストールできます。</p>
  </main>

  <footer>
    &copy; SAKURA-NET
  </footer>

</body>
</html>
