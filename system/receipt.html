<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>領収書</title>
    <style>
        body {
            font-family: 'Inter', 'Meiryo', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 15px;
            color: #333;
        }

        .receipt-card {
            background: #fff;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            margin: 0 auto;
        }

        .title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .date {
            text-align: right;
            font-size: 14px;
            margin-bottom: 20px;
            color: #666;
        }

        .name-row {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 30px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
        }

        .amount-box {
            background: #f0f3f8;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 30px;
        }

        .amount-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .amount-value {
            font-size: 32px;
            font-weight: bold;
            color: #c82054;
        }

        .detail-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .detail-table th,
        .detail-table td {
            padding: 10px 5px;
            border-bottom: 1px solid #eee;
            text-align: right;
        }

        .detail-table th {
            text-align: left;
            color: #666;
            font-weight: normal;
        }

        .company-info {
            font-size: 13px;
            line-height: 1.6;
            color: #555;
            text-align: right;
            margin-bottom: 40px;
        }

        .sig-container {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            background: #fafbfc;
            touch-action: none;
            position: relative;
        }

        .sig-label {
            font-weight: bold;
            font-size: 14px;
            color: #c82054;
            margin-bottom: 10px;
        }

        #sig-canvas {
            width: 100%;
            height: 150px;
            background: #fff;
            border-radius: 4px;
            border: 1px solid #eee;
            cursor: crosshair;
        }

        .btn-clear {
            background: #fff;
            border: 1px solid #ccc;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            color: #666;
            margin-top: 10px;
        }

        .btn-clear:hover {
            background: #f0f0f0;
        }

        .btn-submit {
            background: #c82054;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(200, 32, 84, 0.2);
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background: #e03164;
        }

        .share-container {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px dashed #ccc;
        }

        .share-label {
            font-size: 14px;
            color: #333;
            margin-bottom: 15px;
            font-weight: bold;
            text-align: center;
        }

        .share-methods {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .share-box {
            background: #fbfdfe;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
        }

        .share-box-title {
            font-size: 13px;
            font-weight: bold;
            color: #c82054;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .qr-area {
            display: flex;
            justify-content: center;
            margin-bottom: 5px;
        }

        .email-input-group {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }

        .email-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .btn-mail {
            background: #333;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-mail:hover {
            background: #555;
        }

        .help-text {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
        }
    </style>

    <!-- Firebase SDK (V8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD-IoqRej9KOCWDYy8W7InW3qpu6xxbW8Y",
            authDomain: "sakura-net-db.firebaseapp.com",
            projectId: "sakura-net-db",
            storageBucket: "sakura-net-db.firebasestorage.app",
            messagingSenderId: "764550859520",
            appId: "1:764550859520:web:3a009815df3c95aa3041e5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
</head>

<body>

    <div class="receipt-card">
        <div class="title">領収書</div>
        <div class="date" id="r-date">年 月 日</div>

        <div class="name-row">
            <span id="r-name"></span> 様
        </div>

        <div class="amount-box">
            <div class="amount-label">領収金額（税込）</div>
            <div class="amount-value">¥<span id="r-amount">0</span>-</div>
        </div>

        <table class="detail-table">
            <tr>
                <th>作業料金</th>
                <td>¥<span id="r-feeBase">0</span></td>
            </tr>
            <tr>
                <th>交通費</th>
                <td>¥<span id="r-feeTravel">0</span></td>
            </tr>
            <tr>
                <th>部材費</th>
                <td>¥<span id="r-feeParts">0</span></td>
            </tr>
        </table>

        <div class="company-info">
            〒532-0012<br>
            大阪市淀川区木川東4-3-34-514<br>
            <strong>株式会社さくらねっと</strong><br>
            TEL: 06-7777-2720<br>
            登録番号：T9120001205370
        </div>

        <div class="sig-container">
            <div class="sig-label">お客様サイン</div>
            <canvas id="sig-canvas"></canvas>
            <div>
                <button class="btn-clear" onclick="clearSignature()">書き直す</button>
            </div>
            <button class="btn-submit" onclick="finishAndClose()">完了して画面を閉じる</button>
        </div>

        <div class="thank-you">
            この度はご依頼いただき、誠にありがとうございました。
        </div>

        <!-- お客様控え用シェアエリア -->
        <div class="share-container">
            <div class="share-label">領収書（控え）のお渡し方法</div>

            <div class="share-methods">
                <!-- メール送信 -->
                <div class="share-box">
                    <div class="share-box-title">✉️ メールで送信する</div>
                    <div class="email-input-group">
                        <input type="email" id="customer-email" class="email-input" placeholder="お客様のメールアドレス">
                        <button class="btn-mail" onclick="sendReceiptEmail()">送信準備</button>
                    </div>
                    <div class="help-text">※送信ボタンを押すと標準のメールアプリが起動します</div>
                </div>

                <!-- QRコード -->
                <div class="share-box">
                    <div class="share-box-title">📱 QRコードで読み取る</div>
                    <div class="help-text" style="margin-bottom:10px; margin-top:0;">
                        カメラで読み取るとスマホでこの領収書を開けます<br>(※将来Webサーバー移行時に有効になります)</div>
                    <div class="qr-area" id="receipt-qr"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 先に表示部分を処理
            const params = new URLSearchParams(window.location.search);

            const name = params.get('name') || '';
            const amount = params.get('amount') || '0';
            const feeBase = params.get('base') || '0';
            const feeTravel = params.get('travel') || '0';
            const feeParts = params.get('parts') || '0';
            const dateStr = params.get('date') || '';

            document.getElementById('r-name').textContent = name;
            document.getElementById('r-amount').textContent = parseInt(amount || 0).toLocaleString();
            document.getElementById('r-feeBase').textContent = parseInt(feeBase || 0).toLocaleString();
            document.getElementById('r-feeTravel').textContent = parseInt(feeTravel || 0).toLocaleString();
            document.getElementById('r-feeParts').textContent = parseInt(feeParts || 0).toLocaleString();

            // 日付整形
            let formattedDate = "";
            if (dateStr) {
                const dt = new Date(dateStr.replace(/-/g, '/'));
                if (!isNaN(dt)) {
                    formattedDate = `${dt.getFullYear()}年 ${dt.getMonth() + 1}月 ${dt.getDate()}日`;
                    document.getElementById('r-date').textContent = formattedDate;
                } else {
                    formattedDate = dateStr;
                    document.getElementById('r-date').textContent = dateStr;
                }
            } else {
                const dt = new Date();
                formattedDate = `${dt.getFullYear()}年 ${dt.getMonth() + 1}月 ${dt.getDate()}日`;
                document.getElementById('r-date').textContent = formattedDate;
            }

            // URLからのメールアドレス取得（あれば初期表示）
            const urlEmail = params.get('email') || '';
            if (urlEmail) {
                document.getElementById('customer-email').value = urlEmail;
            }

            // テキストデータ（QR・メール共通）の作成
            window.receiptTextData = `【領収書】
宛名: ${name} 様
日付: ${formattedDate}
領収金額: ¥${parseInt(amount || 0).toLocaleString()}-

作業料金: ¥${parseInt(feeBase || 0).toLocaleString()}
交通費: ¥${parseInt(feeTravel || 0).toLocaleString()}
部材費: ¥${parseInt(feeParts || 0).toLocaleString()}

株式会社さくらねっと
TEL: 06-7777-2720

[お客様サイン]`;

            try {
                // qrcode-generator ライブラリを使用してUTF-8対応のQRコードを生成する
                const qr = qrcode(0, 'M');
                // QRコードは現在のページURL（将来サーバーアップロードされた際への対応）
                qr.addData(window.location.href);
                qr.make();
                document.getElementById('receipt-qr').innerHTML = qr.createImgTag(4, 16);
            } catch (e) {
                console.error('QRコードの生成に失敗しました:', e);
                document.getElementById('receipt-qr').innerText = 'QRコードを生成できませんでした';
            }

            // サイン領域の初期化
            initSignature();

            // 既存サインのロード（Firestoreから）
            const recordId = params.get('id');
            if (recordId) {
                db.collection('signatures').doc(recordId).get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.signature) {
                            setTimeout(() => {
                                const img = new Image();
                                img.onload = () => {
                                    // タブレット等で書かれた大きいサイズのサインをスマホ画面の中央に縮小して配置する
                                    const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
                                    const w = img.width * scale;
                                    const h = img.height * scale;
                                    const x = (canvas.width - w) / 2;
                                    const y = (canvas.height - h) / 2;
                                    ctx.drawImage(img, x, y, w, h);
                                };
                                img.src = data.signature;
                            }, 100);
                        }
                    }
                }).catch((error) => {
                    console.error("サインの読み込みに失敗しました:", error);
                });
            }
        });

        // メール送信処理
        function sendReceiptEmail() {
            const emailInput = document.getElementById('customer-email').value.trim();
            if (!emailInput) {
                alert('お客様のメールアドレスを入力してください。');
                return;
            }

            const subject = encodeURIComponent("領収書のご送付（株式会社さくらねっと）");
            const body = encodeURIComponent(window.receiptTextData + "\n\n※このメールは株式会社さくらねっとのシステムより送信しております。");

            // mailto リンクを開いて標準メールアプリを起動
            window.location.href = `mailto:${emailInput}?subject=${subject}&body=${body}`;
        }

        // メール送信処理
        function sendReceiptEmail() {
            const emailInput = document.getElementById('customer-email').value.trim();
            if (!emailInput) {
                alert('お客様のメールアドレスを入力してください。');
                return;
            }

            const subject = encodeURIComponent("領収書のご送付（株式会社さくらねっと）");
            const body = encodeURIComponent(window.receiptTextData + "\n\n※このメールは株式会社さくらねっとのシステムより送信しております。");

            // mailto リンクを開いて標準メールアプリを起動
            window.location.href = `mailto:${emailInput}?subject=${subject}&body=${body}`;
        }

        // サイン処理
        const canvas = document.getElementById('sig-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        function initSignature() {
            // ちょっと待ってからリサイズ（DOMレンダリング完了後）
            setTimeout(() => {
                resizeCanvas();
            }, 50);
            window.addEventListener('resize', resizeCanvas);

            canvas.addEventListener('mousedown', startPosition);
            canvas.addEventListener('mouseup', endPosition);
            canvas.addEventListener('mousemove', draw);

            canvas.addEventListener('touchstart', startPosition, { passive: false });
            canvas.addEventListener('touchend', endPosition);
            canvas.addEventListener('touchmove', draw, { passive: false });
        }

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            // borderなどがあるため、コンテナの幅から適切に引く
            let w = rect.width - 34;
            if (w < 100) w = 300; // fallback

            // 既存の描画内容を保存
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            if (canvas.width > 0 && canvas.height > 0) {
                tempCtx.drawImage(canvas, 0, 0);
            }

            canvas.width = w;
            canvas.height = 150;

            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // 復元
            if (tempCanvas.width > 0 && tempCanvas.height > 0) {
                ctx.drawImage(tempCanvas, 0, 0);
            }
        }

        function startPosition(e) {
            e.preventDefault();
            isDrawing = true;
            draw(e);
        }

        function endPosition(e) {
            if (e) e.preventDefault();
            if (isDrawing) {
                isDrawing = false;
                ctx.beginPath();
                saveSignatureToStorage();
            }
        }

        function draw(e) {
            if (!isDrawing) return;
            if (e) e.preventDefault();

            let x, y;
            const rect = canvas.getBoundingClientRect();
            if (e.touches && e.touches.length > 0) {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function clearSignature() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            saveSignatureToStorage();
        }

        function saveSignatureToStorage() {
            if (!canvas) return;
            const params = new URLSearchParams(window.location.search);
            const recordId = params.get('id');
            if (!recordId) return;

            const dataURL = canvas.toDataURL();

            // Firestoreに保存
            db.collection('signatures').doc(recordId).set({
                signature: dataURL,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true })
                .catch((error) => {
                    console.error("Firestoreへのサイン保存に失敗しました:", error);
                });
        }

        function finishAndClose() {
            saveSignatureToStorage();
            window.close();
        }
    </script>

</body>

</html>
